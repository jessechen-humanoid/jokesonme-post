<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    /* 1080 x 1350 = IG 直式 4:5 */
    width: 1080px;
    height: 1350px;
    font-family: "Noto Sans CJK TC", "Noto Sans TC", sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .canvas {
    position: relative;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    color: #fff;
  }

  /* 底圖：每次換這張就好 */
  .bg {
    position: absolute;
    inset: 0;
    background-image: var(--bg);
    background-size: cover;
    background-position: center;
  }

  /* 壓暗遮罩，讓白字讀得清楚。深淺用 --overlay 調 */
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,0,0,0.48) 0%,
      rgba(0,0,0,0.62) 42%,
      rgba(0,0,0,0.74) 100%
    );
    opacity: var(--overlay, 1);
  }

  .content {
    position: absolute;
    inset: 0;
    padding: 82px 88px 82px;
    display: flex;
    flex-direction: column;
  }

  .title {
    font-weight: 900;
    font-size: 78px;
    line-height: 1.1;
    letter-spacing: 1px;
    margin-bottom: 36px;
    text-align: center;
    text-shadow: 0 3px 18px rgba(0,0,0,0.45);
  }

  .intro {
    font-weight: 500;
    font-size: 31px;
    line-height: 1.72;
    letter-spacing: 0.3px;
    margin-bottom: 34px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }
  .intro b { font-weight: 900; }

  ol.list {
    list-style: none;
    counter-reset: item;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  ol.list > li {
    counter-increment: item;
    position: relative;
    padding-left: 50px;
    font-weight: 500;
    font-size: 31px;
    line-height: 1.62;
    letter-spacing: 0.2px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
  }
  ol.list > li::before {
    content: counter(item) ".";
    position: absolute;
    left: 0;
    top: 0;
    font-weight: 900;
    font-size: 31px;
  }
  ol.list > li b { font-weight: 900; }
</style>

<div class="canvas">
  <div class="bg" style="--bg: {{BG}}; --overlay: {{OVERLAY}};"></div>
  <div class="content">
    <div class="title">{{TITLE}}</div>
    <div class="intro">{{INTRO}}</div>
    <ol class="list">{{LIST}}</ol>
  </div>
</div>
